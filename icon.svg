  <!-- Bottom-right cell: X (blue) -->
  <line x1="356" y1="356" x2="404" y2="404" stroke="#3b82f6" stroke-width="22" stroke-linecap="round"/>
  <line x1="404" y1="356" x2="356" y2="404" stroke="#3b82f6" stroke-width="22" stroke-linecap="round"/>

  <!-- Top-right cell: O (red) -->
  <circle cx="380" cy="132" r="32" fill="none" stroke="#ef4444" stroke-width="18"/>
